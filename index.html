<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Počítadlo stromčekov</title>
    <link rel="stylesheet" href="./style.css?v=__BUILD__" />
  </head>
  <body>
    <p id="appVersion" class="app-version">Verzia: načítavam…</p>
    <main class="container">
      <h1>Počítadlo stromčekov</h1>
      <p class="hint">
        Odfoť čelá kmeňov (pne, polená v hromade) a aplikácia ich spočíta.
        Chybné označenie opravíš ťuknutím do obrázka: ťuknutím na krúžok ho
        zmažeš, ťuknutím na nespočítané poleno ho pridáš.
      </p>

      <h2 id="result" class="result" hidden>Počet: <span id="resultCount">–</span></h2>

      <section class="preview">
        <div id="placeholder" class="placeholder">Zatiaľ žiadna fotka</div>
        <div id="cameraWrap" class="camera-wrap" hidden>
          <video id="video" autoplay playsinline muted></video>
          <button id="closeCameraBtn" class="camera-close" aria-label="Zavrieť kameru">✕</button>
          <button id="shutterBtn" class="shutter" aria-label="Odfotiť a spočítať"></button>
        </div>
        <canvas id="canvas" hidden></canvas>
      </section>

      <section class="controls">
        <button id="pickBtn" class="primary">📷 Odfotiť / vybrať fotku</button>
        <input id="fileInput" type="file" accept="image/*" hidden />
        <button id="cameraBtn" class="secondary">🎥 Živý náhľad</button>
        <button id="recountBtn" class="secondary" hidden>Prepočítať znova</button>
      </section>

      <p id="status" class="status"></p>

      <details class="settings">
        <summary>Nastavenia</summary>

        <label>
          <span class="setting-name">Najmenšie poleno: <b><span id="minDiamValue">26</span> px</b></span>
          <input id="minDiam" type="range" min="8" max="120" value="26" />
          <span class="setting-help">
            Všetko s menším priemerom (v pixeloch fotky) sa ignoruje. Zväčši,
            ak ti počíta malé fliačiky navyše; zmenši, ak vynecháva malé polienka.
          </span>
        </label>

        <label>
          <span class="setting-name">Citlivosť na drevo: <b><span id="biasValue">0</span></b></span>
          <input id="bias" type="range" min="-40" max="40" value="0" />
          <span class="setting-help">
            Prah svetlosti dreva sa určuje automaticky; týmto ho doladíš.
            Plus = za drevo sa berie viac plochy (keď polená vynecháva),
            mínus = menej (keď počíta aj pozadie).
          </span>
        </label>

        <label class="checkbox">
          <input id="showMask" type="checkbox" />
          <span class="setting-name">Zobraziť masku dreva (na ladenie)</span>
          <span class="setting-help">
            Zeleno podfarbí plochu, ktorú algoritmus považuje za drevo.
          </span>
        </label>
      </details>
    </main>

    <script src="./app.js?v=__BUILD__"></script>
  </body>
</html>
